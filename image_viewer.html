<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片檢視器 | Marching Cubes 成果圖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e2a3a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .viewer-container {
            background: white;
            border-radius: 2rem;
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .header {
            background: #2c7da0;
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .image-area {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            min-height: 500px;
        }
        .image-area img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: #e9edf2;
        }
        button {
            background: #2c7da0;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #1e5a73;
        }
        .thumbnails {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: white;
            border-top: 1px solid #cbd5e1;
            flex-wrap: wrap;
        }
        .thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 0.5rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.1s;
        }
        .thumb.active {
            border-color: #2c7da0;
            transform: scale(1.05);
        }
        .footer-nav {
            text-align: center;
            padding: 1rem;
            background: #f8fafc;
            font-size: 0.85rem;
        }
        a {
            color: #2c7da0;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        /* 模態框（點擊圖片放大） */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 1rem;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="viewer-container">
    <div class="header">
        <h1>🖼️ Marching Cubes 成果圖檢視器</h1>
        <p>球體、雙曲面、心形、螺旋管、星形、波浪面、橢球面等多種幾何</p>
    </div>

    <div class="image-area">
        <img id="mainImage" src="images/0_sphere.png" alt="成果圖">
    </div>

    <div class="controls">
        <button id="prevBtn">◀ 上一張</button>
        <button id="nextBtn">下一張 ▶</button>
    </div>

    <div class="thumbnails">
        <img class="thumb" data-img="images/0_sphere.png" src="images/0_sphere.png" alt="球體">
        <img class="thumb" data-img="images/0_hyperboloid.png" src="images/0_hyperboloid.png" alt="雙曲面">
        <img class="thumb" data-img="images/1_heart.png" src="images/1_heart.png" alt="心形">
        <img class="thumb" data-img="images/1_sphere.png" src="images/1_sphere.png" alt="球面">
        <img class="thumb" data-img="images/1_spiraltube.png" src="images/1_spiraltube.png" alt="螺旋管">
        <img class="thumb" data-img="images/1_star.png" src="images/1_star.png" alt="星形球殼">
        <img class="thumb" data-img="images/1_wave.png" src="images/1_wave.png" alt="波浪面">
        <img class="thumb" data-img="images/2_colors_sphere.png" src="images/2_colors_sphere.png" alt="彩色球面">
        <img class="thumb" data-img="images/2_ellipsoid.png" src="images/2_ellipsoid.png" alt="橢球面">
        <img class="thumb" data-img="images/2_monocolor_sphere.png" src="images/2_monocolor_sphere.png" alt="單色球面">
    </div>

    <div class="footer-nav">
        <a href="index.html">🏠 回首頁</a> | 
        <a href="about-me.html">👤 關於作者</a> | 
        <a href="extended_abstract.html">📄 擴展摘要</a> |
        <a href="README.md">📖 README</a> |
        <a href="pdf_viewer.html">📑 PDF 論文</a>   <!-- 新增連結，指向 pdf_viewer.html -->
    </div>
</div>

<!-- 點擊圖片放大的模態框 -->
<div id="modal" class="modal">
    <span class="modal-close">&times;</span>
    <img id="modalImg" src="">
</div>

<script>
    // 完整圖片路徑列表（與縮圖 data-img 完全一致）
    const images = [
        "images/0_sphere.png",
        "images/0_hyperboloid.png",
        "images/1_heart.png",
        "images/1_sphere.png",
        "images/1_spiraltube.png",
        "images/1_star.png",
        "images/1_wave.png",
        "images/2_colors_sphere.png",
        "images/2_ellipsoid.png",
        "images/2_monocolor_sphere.png"
    ];

    let currentIndex = 0;
    const mainImg = document.getElementById("mainImage");
    const thumbs = document.querySelectorAll(".thumb");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const closeModal = document.querySelector(".modal-close");

    // 更新主圖與縮圖高亮
    function updateImage(index) {
        currentIndex = (index + images.length) % images.length;
        mainImg.src = images[currentIndex];
        thumbs.forEach(thumb => {
            const thumbPath = thumb.getAttribute("data-img");
            if (thumbPath === images[currentIndex]) {
                thumb.classList.add("active");
            } else {
                thumb.classList.remove("active");
            }
        });
    }

    // 上一張 / 下一張
    document.getElementById("prevBtn").addEventListener("click", () => updateImage(currentIndex - 1));
    document.getElementById("nextBtn").addEventListener("click", () => updateImage(currentIndex + 1));

    // 點擊縮圖切換
    thumbs.forEach(thumb => {
        thumb.addEventListener("click", () => {
            const imgPath = thumb.getAttribute("data-img");
            const newIndex = images.indexOf(imgPath);
            if (newIndex !== -1) updateImage(newIndex);
        });
    });

    // 點擊主圖放大
    mainImg.addEventListener("click", () => {
        modal.style.display = "flex";
        modalImg.src = mainImg.src;
    });
    closeModal.addEventListener("click", () => modal.style.display = "none");
    modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.style.display = "none";
    });

    // 初始化顯示第一張圖片
    updateImage(0);
</script>
</body>
</html>
